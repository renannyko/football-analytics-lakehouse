# =============================================================================
# GitHub Actions - Databricks CI
# =============================================================================
#
# Description:
#   Continuous Integration workflow for validating Databricks Asset Bundles.
#
# Workflow:
#   Git Push
#       -> Checkout Repository
#       -> Install Databricks CLI
#       -> Authenticate
#       -> Validate Bundle
#
# Project:
#   Football Analytics Lakehouse
# =============================================================================

name: Databricks CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks authentication
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

      - name: Validate DEV bundle
        run: databricks bundle validate -t dev

      - name: Validate PROD bundle
        run: databricks bundle validate -t prod

  deploy-dev:
    runs-on: ubuntu-latest
    needs: validate

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks authentication
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

      - name: Deploy DEV bundle
        run: databricks bundle deploy -t dev

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev

    if: github.event_name == 'workflow_dispatch'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks authentication
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

      - name: Deploy PROD bundle
        run: databricks bundle deploy -t prod