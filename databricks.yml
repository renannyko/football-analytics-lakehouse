# =============================================================================
# Databricks Asset Bundle
# =============================================================================
#
# Project:
#   Football Analytics Lakehouse
#
# Description:
#   Asset Bundle definition used to deploy Lakeflow Declarative Pipelines,
#   jobs, and related Databricks resources across project environments.
#
# Environment strategy:
#   - dev  -> football_dev
#   - prod -> football_prod
#
# Notes:
#   This project uses Databricks Free, so the environment strategy intentionally
#   keeps only DEV and PROD to reduce operational complexity.
# =============================================================================

bundle:
  name: football_analytics_lakehouse
  uuid: ae90b0de-8910-4733-aea7-c0dbf6b693a7

include:
  - resources/*.yml

# -----------------------------------------------------------------------------
# Bundle Variables
# -----------------------------------------------------------------------------

variables:
  warehouse_id:
    description: SQL Warehouse used by jobs and BI-oriented SQL workloads.

  catalog:
    description: Unity Catalog catalog used by the selected environment.

  bronze_schema:
    description: Bronze schema used by ingestion and raw pipelines.

  silver_schema:
    description: Silver schema used by standardized analytical pipelines.

  gold_schema:
    description: Gold schema used by curated analytical serving models.

# -----------------------------------------------------------------------------
# Deployment Targets
# -----------------------------------------------------------------------------

targets:

  # ---------------------------------------------------------------------------
  # Development Environment
  # ---------------------------------------------------------------------------

  dev:
    mode: development
    default: true

    workspace:
      host: https://dbc-5c0fc361-6e6b.cloud.databricks.com

    variables:
      warehouse_id: fc6687be1400e996
      catalog: football_dev
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold

  # ---------------------------------------------------------------------------
  # Production Environment
  # ---------------------------------------------------------------------------

  prod:
    mode: production

    workspace:
      host: https://dbc-5c0fc361-6e6b.cloud.databricks.com
      root_path: /Workspace/Users/renannyko@gmail.com/.bundle/${bundle.name}/${bundle.target}

    variables:
      warehouse_id: fc6687be1400e996
      catalog: football_prod
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold

    permissions:
      - user_name: renannyko@gmail.com
        level: CAN_MANAGE