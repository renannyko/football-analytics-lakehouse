# This is a Databricks asset bundle definition for football_analytics_lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: football_analytics_lakehouse
  uuid: ae90b0de-8910-4733-aea7-c0dbf6b693a7

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  warehouse_id:
    description: The warehouse to use
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-5c0fc361-6e6b.cloud.databricks.com
    variables:
      warehouse_id: fc6687be1400e996
      catalog: football_dev
      schema: bronze

  prod:
    mode: production
    workspace:
      host: https://dbc-5c0fc361-6e6b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/renannyko@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/renannyko@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      warehouse_id: fc6687be1400e996
      catalog: football_prod
      schema: bronze
    permissions:
      - user_name: renannyko@gmail.com
        level: CAN_MANAGE
