# =============================================================================
# SQL Job Definition
# =============================================================================
#
# Description:
#   Declarative SQL job reserved for future SQL Warehouse workloads within the
#   Football Analytics Lakehouse project.
#
#   This job can be used later for:
#   - SQL-based validation queries
#   - downstream serving layer refreshes
#   - lightweight data quality checks
#   - analytical maintenance tasks
#
# Project:
#   Football Analytics Lakehouse
#
# Architecture:
#   SQL Warehouse
#       -> Future SQL Tasks
#       -> Analytical / Governance Workloads
# =============================================================================

resources:
  jobs:
    football_analytics_lakehouse_sql_job:
      name: football_analytics_lakehouse_sql_job_${bundle.target}

      email_notifications:
        on_failure:
          - renannyko@gmail.com

      parameters:
        - name: catalog
          default: ${var.catalog}

        - name: bronze_schema
          default: ${var.bronze_schema}

        - name: silver_schema
          default: ${var.silver_schema}

        - name: gold_schema
          default: ${var.gold_schema}

        - name: bundle_target
          default: ${bundle.target}