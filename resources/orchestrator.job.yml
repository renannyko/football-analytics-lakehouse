# =============================================================================
# Lakehouse Orchestrator Job
# =============================================================================
#
# Description:
#   Main orchestration job for the Football Analytics Lakehouse.
#
# Execution order:
#   StatsBomb Ingestion
#       -> Bronze Pipeline
#       -> Silver Pipeline
#       -> Gold Pipeline
# =============================================================================

resources:
  jobs:
    football_analytics_lakehouse_orchestrator:
      name: football_analytics_lakehouse_orchestrator_${bundle.target}

      email_notifications:
        on_failure:
          - renannyko@gmail.com

      tasks:
        - task_key: statsbomb_ingestion
          run_job_task:
            job_id: ${resources.jobs.statsbomb_ingestion_job.id}

        - task_key: bronze_pipeline
          depends_on:
            - task_key: statsbomb_ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_pipeline.id}
            full_refresh: false

        - task_key: silver_pipeline
          depends_on:
            - task_key: bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}
            full_refresh: false

        - task_key: gold_pipeline
          depends_on:
            - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}
            full_refresh: false